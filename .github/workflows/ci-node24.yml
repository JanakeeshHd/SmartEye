name: CI/CD Pipeline (Node.js 24 Native)

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # Backend Tests and Build
  backend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22.x, 24.x]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      
      - name: Install backend dependencies
        run: npm --prefix backend ci
      
      - name: Lint backend code
        run: npm --prefix backend run lint --if-present
      
      - name: Build backend
        run: npm --prefix backend run build --if-present
      
      - name: Run backend tests
        run: npm --prefix backend test --if-present
      
      - name: Upload backend artifacts
        if: success()
        uses: actions/upload-artifact@v5
        with:
          name: backend-build-node-${{ matrix.node-version }}
          path: backend/dist
          if-no-files-found: ignore
          retention-days: 5

  # Frontend Tests and Build
  frontend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22.x, 24.x]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install frontend dependencies
        run: npm --prefix frontend ci
      
      - name: Lint frontend code
        run: npm --prefix frontend run lint --if-present
      
      - name: Build frontend
        run: npm --prefix frontend run build
      
      - name: Run frontend tests
        run: npm --prefix frontend test --if-present
      
      - name: Upload frontend build
        if: success()
        uses: actions/upload-artifact@v5
        with:
          name: frontend-build-node-${{ matrix.node-version }}
          path: frontend/dist
          if-no-files-found: ignore
          retention-days: 5

  # Python AI Service
  ai-service:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      
      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      
      - name: Install AI service dependencies
        working-directory: ai-service
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Lint Python code
        working-directory: ai-service
        run: |
          pip install pylint flake8
          flake8 . --count --statistics --show-source || true
          pylint main.py --disable=all --enable=E,F || true
      
      - name: Type check Python code
        working-directory: ai-service
        run: |
          pip install mypy
          mypy main.py --ignore-missing-imports || true

  # Integration Tests
  integration:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: success()
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      
      - name: Setup Node.js 24.x
        uses: actions/setup-node@v5
        with:
          node-version: '24.x'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      
      - name: Install dependencies
        run: |
          npm --prefix backend ci
          npm --prefix frontend ci
      
      - name: Run backend integration tests
        run: npm --prefix backend run test:integration --if-present
      
      - name: Run frontend integration tests
        run: npm --prefix frontend run test:integration --if-present
